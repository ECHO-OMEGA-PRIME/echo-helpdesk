name = "echo-helpdesk"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "echo-helpdesk"
database_id = "42f320d1-2a00-4f9a-963b-b1c8ea1b21d6"

[[kv_namespaces]]
binding = "CACHE"
id = "e2bda72ee34b414f930735c6b7e3cfd4"

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "SPEAK_CLOUD"
service = "echo-speak-cloud"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
